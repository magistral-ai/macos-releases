name: Auto-assign issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assigner l'issue à WEB-DESIGN-PROD
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue edit "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --add-assignee WEB-DESIGN-PROD
